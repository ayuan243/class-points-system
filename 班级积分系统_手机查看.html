<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📱 班级积分 · 手机查看</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--success:#48c774;--danger:#ff3860;--bg:#f0f2f5;--card:#fff;--text:#333;--light:#888;--shadow:0 4px 16px rgba(0,0,0,.08);--r:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(102,126,234,.4)}
.header h1{font-size:18px;font-weight:800;margin-bottom:2px}
.hd-sub{font-size:12px;opacity:.8;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 1.5s infinite}
.dot.off{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* setup */
.setup{max-width:460px;margin:32px auto;padding:16px}
.card{background:#fff;border-radius:20px;padding:24px;box-shadow:var(--shadow)}
.card-title{font-size:17px;font-weight:800;margin-bottom:6px}
.card-sub{font-size:13px;color:var(--light);margin-bottom:18px;line-height:1.7}
.inp{width:100%;border:1.5px solid #e8e8e8;border-radius:12px;padding:13px 16px;font-size:14px;outline:none;font-family:inherit;color:var(--text);transition:.2s;-webkit-appearance:none}
.inp:focus{border-color:var(--primary)}
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;margin-top:12px;text-align:center;-webkit-appearance:none}
.btn-p{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-p:active{opacity:.8}
.steps{margin-top:18px;font-size:12px;color:#aaa;line-height:2.1;padding-left:18px}

/* main */
.main{padding:14px;max-width:600px;margin:0 auto;padding-bottom:30px}
.sync-bar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:10px 16px;margin-bottom:12px;box-shadow:var(--shadow);font-size:13px}
.sync-time{color:var(--light)}
.btn-rf{background:none;border:none;font-size:20px;cursor:pointer;padding:2px 6px;border-radius:8px}
.btn-rf:active{background:#f0f0f0}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:9px 4px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:#aaa;box-shadow:var(--shadow);transition:.15s}
.tab.on{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}

/* list */
.list{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f5f5f5;gap:10px}
.row:last-child{border-bottom:none}
.rk{width:28px;text-align:center;font-weight:900;font-size:14px;flex-shrink:0;color:var(--light)}
.rk.r1{font-size:20px}.rk.r2{font-size:18px}.rk.r3{font-size:17px}
.ava{width:40px;height:40px;border-radius:50%;background:#f5f6fa;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.info{flex:1;min-width:0}
.nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub{font-size:11px;color:var(--light)}
.sc{font-weight:900;font-size:18px;color:var(--primary)}
.sc-sub{font-size:11px;color:var(--light);text-align:right}
.hist-pts{font-weight:900;font-size:16px;color:var(--primary);flex-shrink:0}
.hist-pts.z{color:var(--light)}
.hist-t{font-size:11px;color:#bbb;flex-shrink:0;text-align:right;min-width:48px}
.empty{text-align:center;padding:48px 20px;color:#ccc}
.empty-ic{font-size:48px;margin-bottom:10px}
</style>
</head>
<body>

<div id="vSetup">
  <div class="header"><h1>📱 班级积分 · 手机查看</h1><div class="hd-sub">实时同步 · 只读</div></div>
  <div class="setup">
    <div class="card">
      <div class="card-title">☁️ 连接到云端数据</div>
      <div class="card-sub">输入老师配置的 Firebase 数据库地址，即可实时查看班级积分。</div>
      <input class="inp" id="urlInput" type="url"
        placeholder="https://xxx-rtdb.asia-southeast1.firebasedatabase.app"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="btn btn-p" id="connectBtn">📡 连接并查看</button>
      <ol class="steps">
        <li>让老师在「设置 → 手机实时查看」里配置 Firebase</li>
        <li>老师把 Firebase 地址发给你（或截图）</li>
        <li>粘贴到上方，点连接</li>
      </ol>
    </div>
  </div>
</div>

<div id="vMain" style="display:none">
  <div class="header">
    <h1 id="vClassName">班级积分系统</h1>
    <div class="hd-sub"><span class="dot" id="syncDot"></span><span id="syncStatus">连接中…</span></div>
  </div>
  <div class="main">
    <div class="sync-bar">
      <span class="sync-time" id="syncTime">—</span>
      <button class="btn-rf" id="refreshBtn">🔄</button>
    </div>
    <div class="tabs">
      <button class="tab on" id="tabLb" onclick="showTab('lb')">🏆 总排名</button>
      <button class="tab" id="tabWk" onclick="showTab('wk')">📅 本周</button>
      <button class="tab" id="tabHist" onclick="showTab('hist')">📋 记录</button>
    </div>
    <div id="pLb"></div>
    <div id="pWk" style="display:none"></div>
    <div id="pHist" style="display:none"></div>
  </div>
</div>

<script>
var D = null;
var firebaseURL = '';
var tab = 'lb';
var timer = null;

// Read URL from hash on load
(function init() {
  var hash = location.hash.slice(1);
  if (hash && hash.startsWith('https://')) {
    firebaseURL = decodeURIComponent(hash);
    document.getElementById('urlInput').value = firebaseURL;
    showMain();
    startPoll();
  }
})();

document.getElementById('connectBtn').onclick = function() {
  var v = document.getElementById('urlInput').value.trim().replace(/\/+$/, '');
  if (!v) { alert('请先粘贴 Firebase 数据库地址'); return; }
  if (!v.startsWith('https://')) { alert('地址应以 https:// 开头'); return; }
  firebaseURL = v;
  // Save in hash so bookmark auto-connects next time
  location.hash = encodeURIComponent(v);
  showMain();
  startPoll();
};

document.getElementById('refreshBtn').onclick = function() { fetchData(); };

function showMain() {
  document.getElementById('vSetup').style.display = 'none';
  document.getElementById('vMain').style.display = 'block';
}

function startPoll() {
  fetchData();
  clearInterval(timer);
  timer = setInterval(fetchData, 10000);
}

function fetchData() {
  if (!firebaseURL) return;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', firebaseURL + '/classData.json?_=' + Date.now(), true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        if (data && data.students) {
          D = data;
          setStatus(true);
          render();
        } else { setStatus(false, '暂无数据，请先在电脑加分'); }
      } catch(e) { setStatus(false, '数据解析错误'); }
    } else { setStatus(false, 'HTTP ' + xhr.status); }
  };
  xhr.onerror = function() { setStatus(false, '网络错误，请检查网络'); };
  xhr.send();
}

function setStatus(ok, msg) {
  var dot = document.getElementById('syncDot');
  var st = document.getElementById('syncStatus');
  var tm = document.getElementById('syncTime');
  if (ok) {
    dot.className = 'dot';
    st.textContent = '实时同步中';
    var t = new Date();
    tm.textContent = '更新于 ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
    if (D && D.className) document.getElementById('vClassName').textContent = D.className;
  } else {
    dot.className = 'dot off';
    st.textContent = '连接失败';
    tm.textContent = msg || '';
  }
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function showTab(t) {
  tab = t;
  ['lb','wk','hist'].forEach(function(x) {
    document.getElementById('tab' + x.charAt(0).toUpperCase() + x.slice(1)).className = 'tab' + (x === t ? ' on' : '');
    document.getElementById('p' + x.charAt(0).toUpperCase() + x.slice(1)).style.display = x === t ? 'block' : 'none';
  });
  // Fix casing for ids
  document.getElementById('tabLb').className = 'tab' + (t==='lb'?' on':'');
  document.getElementById('tabWk').className = 'tab' + (t==='wk'?' on':'');
  document.getElementById('tabHist').className = 'tab' + (t==='hist'?' on':'');
  document.getElementById('pLb').style.display = t==='lb'?'block':'none';
  document.getElementById('pWk').style.display = t==='wk'?'block':'none';
  document.getElementById('pHist').style.display = t==='hist'?'block':'none';
}

function getWeekKey(date) {
  var d = new Date(date); d.setHours(12,0,0,0);
  var day = d.getDay() || 7; d.setDate(d.getDate() + 4 - day);
  var y = d.getFullYear(), ys = new Date(y, 0, 1);
  var w = Math.ceil(((d - ys) / 86400000 + 1) / 7);
  return y + '-W' + (w < 10 ? '0' + w : w);
}
function thisWeek() { return getWeekKey(new Date()); }
function totalScore(sid) {
  if (!D || !D.scoreHistory) return 0;
  return D.scoreHistory.reduce(function(s,h){ return h.studentId===sid ? s+(h.points||0) : s; }, 0);
}
function weekScore(sid, wk) {
  if (!D || !D.scoreHistory) return 0;
  return D.scoreHistory.reduce(function(s,h){ return h.studentId===sid && h.weekKey===wk ? s+(h.points||0) : s; }, 0);
}
function ava(s) {
  if (s.avatar && s.avatar.indexOf('data:') === 0) return '<img src="' + s.avatar + '">';
  return s.avatar || '🐼';
}

function render() {
  renderLb(); renderWk(); renderHist();
}

function renderLb() {
  var el = document.getElementById('pLb');
  if (!D) return;
  var wk = thisWeek();
  var list = D.students.map(function(s){ return {s:s, total:totalScore(s.id), week:weekScore(s.id,wk)}; });
  list.sort(function(a,b){ return b.total - a.total; });
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-ic">🏆</div>暂无数据</div>'; return; }
  var medals = ['🥇','🥈','🥉'];
  el.innerHTML = '<div class="list">' + list.map(function(item,i){
    return '<div class="row"><div class="rk r'+(i<3?i+1:'')+'">'+(i<3?medals[i]:i+1)+'</div>'
      +'<div class="ava">'+ava(item.s)+'</div>'
      +'<div class="info"><div class="nm">'+item.s.name+'</div><div class="sub">学号 '+(item.s.number||i+1)+'</div></div>'
      +'<div style="text-align:right"><div class="sc">'+item.total+'</div><div class="sc-sub">本周 +'+item.week+'</div></div></div>';
  }).join('') + '</div>';
}

function renderWk() {
  var el = document.getElementById('pWk');
  if (!D) return;
  var wk = thisWeek();
  var list = D.students.map(function(s){ return {s:s, week:weekScore(s.id,wk), total:totalScore(s.id)}; });
  list.sort(function(a,b){ return b.week - a.week; });
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-ic">📅</div>暂无本周数据</div>'; return; }
  var medals = ['🥇','🥈','🥉'];
  el.innerHTML = '<div class="list">' + list.map(function(item,i){
    return '<div class="row"><div class="rk r'+(i<3?i+1:'')+'">'+(i<3?medals[i]:i+1)+'</div>'
      +'<div class="ava">'+ava(item.s)+'</div>'
      +'<div class="info"><div class="nm">'+item.s.name+'</div><div class="sub">总分 '+item.total+'</div></div>'
      +'<div style="text-align:right"><div class="sc">+'+item.week+'</div><div class="sc-sub">本周积分</div></div></div>';
  }).join('') + '</div>';
}

function renderHist() {
  var el = document.getElementById('pHist');
  if (!D || !D.scoreHistory) return;
  var hist = D.scoreHistory.slice().sort(function(a,b){ return b.timestamp-a.timestamp; }).slice(0,100);
  if (!hist.length) { el.innerHTML = '<div class="empty"><div class="empty-ic">📋</div>暂无记录</div>'; return; }
  var smap = {};
  D.students.forEach(function(s){ smap[s.id] = s; });
  el.innerHTML = '<div class="list">' + hist.map(function(h){
    var s = smap[h.studentId] || {};
    var d = new Date(h.timestamp);
    var ts = (d.getMonth()+1)+'/'+d.getDate()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    return '<div class="row">'
      +'<div class="ava">'+(s.avatar&&s.avatar.indexOf('data:')===0?'<img src="'+s.avatar+'">':s.avatar||'🐼')+'</div>'
      +'<div class="info"><div class="nm">'+(h.studentName||s.name||'—')+'</div><div class="sub">'+(h.category||'—')+'</div></div>'
      +'<div class="hist-pts'+(h.points===0?' z':'')+'">'+( h.points===0?'💪':'+'+h.points)+'</div>'
      +'<div class="hist-t">'+ts+'</div></div>';
  }).join('') + '</div>';
}
</script>
</body>
</html>

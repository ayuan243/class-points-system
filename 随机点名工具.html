<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 5班 随机抽签</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--secondary:#f6a623;--success:#48c774;--danger:#ff3860;--text:#333;--text-light:#888;--shadow:0 8px 32px rgba(0,0,0,.12)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:var(--text);overflow-x:hidden;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
.header{text-align:center;color:#fff;margin-bottom:24px;margin-top:16px}
.header h1{font-size:30px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 12px rgba(0,0,0,.2)}
.header p{font-size:14px;opacity:.85;margin-top:6px}
.card{background:#fff;border-radius:28px;box-shadow:var(--shadow);padding:36px 28px;width:100%;max-width:480px;text-align:center;position:relative}
.slot{min-height:240px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8f9ff,#fff);border-radius:24px;border:4px solid #eee;margin-bottom:24px;transition:border-color .2s;overflow:hidden;position:relative}
.slot.spinning{border-color:var(--secondary);animation:pulse .25s ease-in-out infinite alternate}
@keyframes pulse{from{border-color:var(--secondary)}to{border-color:var(--primary)}}
.slot-item{text-align:center;animation:flash .1s ease}
@keyframes flash{from{opacity:.3;transform:scale(.85) translateY(15px)}to{opacity:1;transform:scale(1) translateY(0)}}
.slot-ava{font-size:96px;line-height:1;margin-bottom:14px;display:block}
.slot-name{font-size:34px;font-weight:900;color:var(--text);letter-spacing:1px}
.slot-num{font-size:13px;color:var(--text-light);margin-top:6px;font-weight:600}
.result{animation:popIn .45s cubic-bezier(.175,.885,.32,1.275);border-color:var(--primary)!important}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.start-btn{width:100%;padding:20px;background:linear-gradient(135deg,#f6a623,#f0665d);color:#fff;border:none;border-radius:18px;font-size:20px;font-weight:800;cursor:pointer;transition:.15s;font-family:inherit;box-shadow:0 8px 24px rgba(246,166,35,.4)}
.start-btn:hover{transform:translateY(-2px)}
.start-btn:active{transform:scale(.97)}
.start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.action-row{display:flex;gap:10px;margin-top:14px}
.action-row button{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.btn-secondary{background:#f0f2f5;color:var(--text)}
.btn-secondary:hover{background:#e0e3f0}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover{transform:translateY(-1px)}
.options-row{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:18px;border-top:1px dashed #e0e3f0;font-size:13px;color:var(--text-light)}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.toggle input{width:36px;height:20px;appearance:none;background:#ddd;border-radius:20px;position:relative;cursor:pointer;transition:.2s}
.toggle input:checked{background:var(--primary)}
.toggle input::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked::after{left:18px}
.stats-row{display:flex;justify-content:center;gap:24px;margin-top:14px;font-size:13px;color:var(--text-light)}
.stats-row strong{color:var(--primary);font-weight:800;font-size:15px}
.bottom-btns{display:flex;gap:12px;margin-top:14px}
.list-btn{flex:1;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.5);color:#fff;cursor:pointer;font-size:13px;font-weight:700;padding:10px 16px;border-radius:14px;font-family:inherit;transition:.15s}
.list-btn:hover{background:rgba(255,255,255,.3)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:800}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f0f2f5;cursor:pointer;font-size:14px}

/* Student list grid */
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px}
.list-item{padding:10px 6px;text-align:center;background:#f8f9ff;border-radius:12px;font-size:13px;position:relative;transition:.15s}
.list-item.picked{background:#e8f5e8;color:var(--success);font-weight:700}
.list-item.picked::after{content:'✓';position:absolute;top:4px;right:6px;font-size:11px;color:var(--success)}
.list-ava{font-size:24px;display:block;margin-bottom:3px}
.list-num{font-size:10px;color:var(--text-light);position:absolute;top:4px;left:6px;font-weight:700}

/* Manage modal */
.sec-lbl{font-size:11px;font-weight:800;letter-spacing:.8px;color:#aaa;text-transform:uppercase;margin:16px 0 8px}
.form-input{width:100%;border:1.5px solid #e8e8e8;border-radius:12px;padding:12px 16px;font-size:14px;outline:none;font-family:inherit;color:var(--text);transition:.2s;resize:vertical}
.form-input:focus{border-color:var(--primary)}
.btn{padding:11px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-danger{background:#fff0f3;color:var(--danger)}
.btn-danger:hover{background:#ffe0e8}

/* Manage list */
.manage-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #f5f5f5;gap:10px;border-radius:10px;transition:.15s}
.manage-item:hover{background:#f8f9ff}
.manage-item:last-child{border-bottom:none}
.manage-ava{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.manage-name{flex:1;font-weight:600;font-size:14px}
.manage-num{font-size:11px;color:var(--text-light);margin-right:6px}
.del-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 8px;border-radius:8px;transition:.15s;color:#ccc}
.del-btn:hover{background:#fff0f3;color:var(--danger)}

/* Batch bar */
.batch-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.batch-bar button{padding:7px 14px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* Check items */
.manage-item.checked{background:#f0f3ff;border-left:3px solid var(--primary)}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:.15s;font-size:13px}
.manage-item.checked .check-circle{background:var(--primary);border-color:var(--primary);color:#fff}

.empty{text-align:center;padding:40px 20px;color:#bbb;font-size:14px}
.empty-icon{font-size:48px;margin-bottom:10px}

#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:299}
.footer{margin-top:24px;color:rgba(255,255,255,.6);font-size:12px;text-align:center}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,.92);color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="header">
  <h1>🎲 5班 随机抽签</h1>
  <p id="header-sub">点击按钮，随机抽取一位同学</p>
</div>

<div class="card">
  <div id="slot" class="slot">
    <div class="slot-item">
      <span class="slot-ava">🎯</span>
      <div class="slot-name" id="empty-hint">请先导入学生</div>
      <div class="slot-num">点下方「管理学生」添加</div>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startPick()">🎲 开始抽签！</button>
  <div class="action-row" id="action-row" style="display:none">
    <button class="btn-secondary" onclick="startPick()">🔄 再抽一次</button>
    <button class="btn-primary" onclick="resetHistory()">↺ 重置已抽记录</button>
  </div>

  <div class="options-row">
    <label class="toggle">
      <input type="checkbox" id="no-repeat" checked>
      <span>不重复抽（直到所有人都被抽过）</span>
    </label>
  </div>

  <div class="stats-row">
    <span>已抽：<strong id="picked-count">0</strong></span>
    <span>剩余：<strong id="remain-count">0</strong></span>
    <span>共：<strong id="total-count">0</strong></span>
  </div>
</div>

<div class="bottom-btns">
  <button class="list-btn" onclick="openModal('modal-list')">📋 查看名单</button>
  <button class="list-btn" onclick="openModal('modal-manage')">👥 管理学生</button>
</div>

<div class="footer">5班抽签器 · 数据本地保存</div>

<!-- 名单弹窗 -->
<div class="modal-overlay" id="modal-list" onclick="if(event.target===this)closeModal('modal-list')">
  <div class="modal">
    <div class="modal-hd">
      <h2 class="modal-title">📋 全班名单 <span id="modal-count" style="color:var(--text-light);font-size:14px;font-weight:400"></span></h2>
      <button class="modal-close" onclick="closeModal('modal-list')">✕</button>
    </div>
    <div class="list-grid" id="list-grid"></div>
  </div>
</div>

<!-- 管理学生弹窗 -->
<div class="modal-overlay" id="modal-manage" onclick="if(event.target===this)closeModal('modal-manage')">
  <div class="modal">
    <div class="modal-hd">
      <h2 class="modal-title">👥 管理学生</h2>
      <button class="modal-close" onclick="closeModal('modal-manage')">✕</button>
    </div>

    <!-- 批量导入 -->
    <div class="sec-lbl">批量导入（每行一个姓名）</div>
    <textarea class="form-input" id="import-text" rows="5" placeholder="张三&#10;李四&#10;王五&#10;..."></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" onclick="importStudents()" style="flex:1;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff">📥 导入</button>
      <button class="btn" onclick="document.getElementById('import-text').value=''" style="background:#f5f5f5;color:#888">清空</button>
    </div>

    <!-- 已有学生列表 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;margin-bottom:4px">
      <div class="sec-lbl" style="margin:0">当前学生 <span id="manage-count" style="color:var(--primary);font-weight:800"></span></div>
      <button class="btn btn-danger" id="batch-del-btn" onclick="batchDelete()" style="display:none;font-size:12px;padding:6px 12px">🗑️ 删除选中</button>
    </div>
    <!-- 批量操作栏 -->
    <div class="batch-bar" id="batch-bar" style="display:none">
      <button onclick="selectAll()" style="background:#f0f3ff;color:var(--primary)">全选</button>
      <button onclick="deselectAll()" style="background:#f5f5f5;color:#666">取消</button>
      <span id="sel-count" style="font-size:12px;color:var(--text-light)">已选 0 人</span>
      <button onclick="toggleBatch(false)" style="background:#f5f5f5;color:#666;margin-left:auto">退出批量</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <button onclick="toggleBatch(true)" id="enter-batch-btn" style="background:none;border:none;color:var(--text-light);font-size:12px;cursor:pointer;font-family:inherit;padding:2px 0">☑️ 批量选择删除</button>
      <button onclick="clearAllStudents()" style="background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer;font-family:inherit">⚠️ 清空全部</button>
    </div>
    <div id="manage-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'class5PickerV2';
const ANIMALS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦉','🦇','🐺','🐴','🦄','🐝','🦋','🐢','🦎','🐙','🦑','🐠','🐡','🐬','🐳','🦈','🐊','🐘','🦒','🦓','🦔','🐿️','🦜','🦚','🦩','🦢','🐓','🦃','🦅','🦉'];

let DATA = { students: [], pickedHistory: [] };
let batchMode = false;
let selected = new Set();
let pickAnimTimer = null;

// ===== 数据存取 =====
function load() {
  try { DATA = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { students: [], pickedHistory: [] }; }
  catch(e) { DATA = { students: [], pickedHistory: [] }; }
  if (!DATA.students) DATA.students = [];
  if (!DATA.pickedHistory) DATA.pickedHistory = [];
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); } catch(e) {}
}

// ===== Toast =====
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== Modal =====
function openModal(id) { document.getElementById(id).classList.add('show'); if(id==='modal-manage') renderManage(); if(id==='modal-list') renderList(); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show')); });

// ===== 统计显示 =====
function updateStats() {
  const total = DATA.students.length;
  const validPicked = DATA.pickedHistory.filter(n => DATA.students.find(s=>s.number===n)).length;
  document.getElementById('picked-count').textContent = validPicked;
  document.getElementById('remain-count').textContent = total - validPicked;
  document.getElementById('total-count').textContent = total;
  const hint = document.getElementById('empty-hint');
  if (hint) hint.textContent = total === 0 ? '请先导入学生' : '准备好了吗？';
}

// ===== 名单弹窗 =====
function renderList() {
  const grid = document.getElementById('list-grid');
  const count = document.getElementById('modal-count');
  count.textContent = `共 ${DATA.students.length} 人`;
  if (!DATA.students.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">👤</div>暂无学生，请先导入</div>'; return; }
  grid.innerHTML = DATA.students.map(s => {
    const picked = DATA.pickedHistory.includes(s.number);
    return `<div class="list-item ${picked?'picked':''}">
      <div class="list-num">${s.number}</div>
      <span class="list-ava">${s.avatar}</span>
      <div>${s.name}</div>
    </div>`;
  }).join('');
}

// ===== 管理弹窗 =====
function renderManage() {
  const list = document.getElementById('manage-list');
  const cnt = document.getElementById('manage-count');
  cnt.textContent = `${DATA.students.length} 人`;
  if (!DATA.students.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">👤</div>暂无学生</div>';
    return;
  }
  list.innerHTML = DATA.students.map(s => {
    const isSel = selected.has(s.number);
    if (batchMode) {
      return `<div class="manage-item ${isSel?'checked':''}" onclick="toggleSelect(${s.number})">
        <div class="check-circle">${isSel?'✓':''}</div>
        <div class="manage-ava">${s.avatar}</div>
        <div class="manage-name">${s.name}</div>
        <span class="manage-num">No.${s.number}</span>
      </div>`;
    }
    return `<div class="manage-item">
      <div class="manage-ava">${s.avatar}</div>
      <div class="manage-name">${s.name}</div>
      <span class="manage-num">No.${s.number}</span>
      <button class="del-btn" onclick="deleteOne(${s.number})" title="删除">🗑️</button>
    </div>`;
  }).join('');
}

// ===== 导入 =====
function importStudents() {
  const text = document.getElementById('import-text').value.trim();
  if (!text) { showToast('请输入学生姓名'); return; }
  const names = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (!names.length) { showToast('没有有效姓名'); return; }
  let added = 0;
  names.forEach(name => {
    if (DATA.students.find(s => s.name === name)) return;
    const num = DATA.students.length + 1;
    DATA.students.push({ number: num, name, avatar: ANIMALS[(num - 1) % ANIMALS.length] });
    added++;
  });
  save(); updateStats(); renderManage();
  document.getElementById('import-text').value = '';
  showToast(`✅ 导入 ${added} 位同学${names.length - added > 0 ? `（${names.length - added} 位已跳过）` : ''}`);
}

// ===== 删除单个 =====
function deleteOne(num) {
  const s = DATA.students.find(s => s.number === num);
  if (!s || !confirm(`确定删除「${s.name}」？`)) return;
  DATA.students = DATA.students.filter(s => s.number !== num);
  DATA.pickedHistory = DATA.pickedHistory.filter(n => n !== num);
  save(); updateStats(); renderManage();
  showToast('已删除');
}

// ===== 批量删除 =====
function toggleBatch(on) {
  batchMode = on;
  selected.clear();
  document.getElementById('batch-bar').style.display = on ? 'flex' : 'none';
  document.getElementById('batch-del-btn').style.display = on ? 'block' : 'none';
  document.getElementById('enter-batch-btn').style.display = on ? 'none' : 'block';
  renderManage();
}
function toggleSelect(num) {
  if (selected.has(num)) selected.delete(num); else selected.add(num);
  document.getElementById('sel-count').textContent = `已选 ${selected.size} 人`;
  renderManage();
}
function selectAll() { DATA.students.forEach(s => selected.add(s.number)); document.getElementById('sel-count').textContent = `已选 ${selected.size} 人`; renderManage(); }
function deselectAll() { selected.clear(); document.getElementById('sel-count').textContent = '已选 0 人'; renderManage(); }
function batchDelete() {
  if (!selected.size) { showToast('请先选择要删除的同学'); return; }
  const names = DATA.students.filter(s => selected.has(s.number)).map(s => s.name);
  if (!confirm(`确定删除以下 ${selected.size} 位同学？\n${names.join('、')}`)) return;
  DATA.students = DATA.students.filter(s => !selected.has(s.number));
  DATA.pickedHistory = DATA.pickedHistory.filter(n => !selected.has(n));
  // 重新编号
  DATA.students.forEach((s, i) => { s.number = i + 1; });
  DATA.pickedHistory = []; // 清空已抽（编号已变）
  selected.clear();
  save(); updateStats(); toggleBatch(false);
  showToast(`✅ 已删除 ${names.length} 位同学`);
}
function clearAllStudents() {
  if (!DATA.students.length) { showToast('已经是空的了'); return; }
  if (!confirm(`确定清空全部 ${DATA.students.length} 位同学？此操作不可恢复。`)) return;
  DATA.students = []; DATA.pickedHistory = [];
  save(); updateStats(); renderManage();
  showToast('✅ 已清空全部学生');
}

// ===== 抽签 =====
function startPick() {
  if (!DATA.students.length) { showToast('请先在「管理学生」里导入同学'); return; }
  clearTimeout(pickAnimTimer);
  const noRepeat = document.getElementById('no-repeat').checked;
  let pool = noRepeat ? DATA.students.filter(s => !DATA.pickedHistory.includes(s.number)) : DATA.students.slice();
  if (pool.length === 0) { showToast('🎊 所有同学都被抽过了！点「重置」重新开始'); return; }

  const startBtn = document.getElementById('start-btn');
  startBtn.disabled = true; startBtn.textContent = '抽签中…';
  document.getElementById('action-row').style.display = 'none';
  document.getElementById('slot').classList.add('spinning');
  document.getElementById('slot').classList.remove('result');

  const winner = pool[Math.floor(Math.random() * pool.length)];
  const totalSteps = 30 + Math.floor(Math.random() * 14);
  let step = 0, delay = 55;

  function tick() {
    const rand = DATA.students[Math.floor(Math.random() * DATA.students.length)];
    renderSlot(rand, false);
    step++;
    if (step >= totalSteps) {
      document.getElementById('slot').classList.remove('spinning');
      renderSlot(winner, true);
      if (!DATA.pickedHistory.includes(winner.number)) {
        DATA.pickedHistory.push(winner.number);
        save();
      }
      updateStats();
      startBtn.style.display = 'none';
      document.getElementById('action-row').style.display = 'flex';
      launchConfetti();
    } else {
      if (step > totalSteps * 0.65) delay = Math.min(delay * 1.18, 460);
      pickAnimTimer = setTimeout(tick, delay);
    }
  }
  tick();
}

function renderSlot(s, isResult) {
  const slot = document.getElementById('slot');
  slot.innerHTML = `<div class="slot-item">
    <span class="slot-ava">${s.avatar}</span>
    <div class="slot-name">${s.name}</div>
    <div class="slot-num">学号 ${String(s.number).padStart(2,'0')}</div>
  </div>`;
  if (isResult) slot.classList.add('result'); else slot.classList.remove('result');
}

function resetHistory() {
  if (!confirm('确定要重置「已抽记录」吗？所有同学将重新参与抽签。')) return;
  DATA.pickedHistory = []; save(); updateStats();
  const slot = document.getElementById('slot');
  slot.classList.remove('result');
  slot.innerHTML = `<div class="slot-item"><span class="slot-ava">🎯</span><div class="slot-name">已重置！</div><div class="slot-num">所有同学重新参与抽签</div></div>`;
  const startBtn = document.getElementById('start-btn');
  startBtn.style.display = 'block'; startBtn.disabled = false; startBtn.textContent = '🎲 开始抽签！';
  document.getElementById('action-row').style.display = 'none';
}

// ===== 彩带 =====
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#667eea','#764ba2','#f6a623','#48c774','#ff7eb6','#00d1b2','#ff3860'];
  const particles = Array.from({length:90}, () => ({
    x:Math.random()*canvas.width, y:-20,
    vx:(Math.random()-.5)*6, vy:Math.random()*4+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    size:Math.random()*10+4, rot:Math.random()*Math.PI*2,
    rotSpd:(Math.random()-.5)*.3, shape:Math.random()<.5?'rect':'circle'
  }));
  let frame = 0;
  function animate() {
    if (frame++ > 160) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotSpd; p.vy+=.12;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color;
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);}
      ctx.restore();
    });
    requestAnimationFrame(animate);
  }
  animate();
}

document.addEventListener('keydown', e => {
  if (e.key===' ' || e.key==='Enter') {
    const btn = document.getElementById('start-btn');
    if (!btn.disabled && btn.style.display !== 'none') { e.preventDefault(); startPick(); }
  }
});

load();
updateStats();
if (DATA.students.length > 0) {
  document.getElementById('slot').innerHTML = `<div class="slot-item"><span class="slot-ava">🎯</span><div class="slot-name">准备好了吗？</div><div class="slot-num">点击下方按钮开始</div></div>`;
}
